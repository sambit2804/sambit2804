<svg fill="none" width="800" height="220" viewBox="0 0 800 220" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        .arcade-box {
          background: #0f0c1b;
          border: 3px solid #ff0055;
          border-radius: 16px;
          padding: 20px;
          font-family: 'Press Start 2P', 'Courier New', monospace;
          color: #fff;
          position: relative;
          overflow: hidden;
          box-shadow: 0 0 20px rgba(255, 0, 85, 0.4), inset 0 0 15px rgba(0, 0, 0, 0.8);
        }

        .arcade-top {
          display: flex;
          justify-content: space-between;
          font-size: 11px;
          color: #ffcc00;
          letter-spacing: 1px;
          margin-bottom: 15px;
          text-shadow: 2px 2px #ff0055;
        }

        .game-stage {
          display: flex;
          align-items: center;
          justify-content: space-between;
          height: 110px;
          background: linear-gradient(180deg, #1b1435 0%, #0d091a 100%);
          border: 2px dashed #443366;
          border-radius: 10px;
          padding: 0 30px;
          position: relative;
        }

        /* Mario Jump Animation */
        .mario {
          font-size: 32px;
          position: absolute;
          left: 60px;
          bottom: 15px;
          animation: mario-jump 1.6s ease-in-out infinite;
        }

        @keyframes mario-jump {
          0%, 100% { transform: translateY(0); }
          50% { transform: translateY(-45px); }
        }

        /* Question Block */
        .block {
          width: 36px;
          height: 36px;
          background: #ffaa00;
          border: 3px solid #fff;
          border-radius: 4px;
          display: flex;
          align-items: center;
          justify-content: center;
          font-weight: bold;
          color: #884400;
          font-size: 18px;
          position: absolute;
          left: 62px;
          top: 15px;
          box-shadow: 0 4px #cc8800;
          animation: block-bounce 1.6s ease-in-out infinite;
        }

        @keyframes block-bounce {
          0%, 100% { transform: translateY(0); }
          50% { transform: translateY(-8px); }
        }

        /* Coin Floating */
        .coin {
          position: absolute;
          left: 70px;
          top: 0px;
          font-size: 20px;
          opacity: 0;
          animation: coin-pop 1.6s ease-in-out infinite;
        }

        @keyframes coin-pop {
          0%, 40% { opacity: 0; transform: translateY(10px); }
          50% { opacity: 1; transform: translateY(-25px); }
          70%, 100% { opacity: 0; transform: translateY(-35px); }
        }

        .title-text {
          text-align: right;
        }

        .main-title {
          font-size: 22px;
          color: #00ffcc;
          text-shadow: 3px 3px #9900ff;
          margin: 0;
          letter-spacing: 2px;
        }

        .sub-title {
          font-size: 10px;
          color: #ff66cc;
          margin-top: 8px;
          letter-spacing: 1px;
        }

        .ground {
          position: absolute;
          bottom: 0;
          left: 0;
          right: 0;
          height: 10px;
          background: repeating-linear-gradient(90deg, #ff0055, #ff0055 10px, #ffcc00 10px, #ffcc00 20px);
        }
      </style>
      <div class="arcade-box">
        <div class="arcade-top">
          <span>MARIO x SAMBIT</span>
          <span>SCORE: 099990</span>
          <span>WORLD: 1-1</span>
          <span>TIME: 999</span>
        </div>
        <div class="game-stage">
          <div class="coin">🪙</div>
          <div class="block">?</div>
          <div class="mario">🏃‍♂️</div>
          <div class="title-text">
            <h1 class="main-title">SAMBIT DAS</h1>
            <div class="sub-title">PRESS START TO PLAY WITH AI &amp; WEB3</div>
          </div>
          <div class="ground"></div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
