<svg fill="none" width="800" height="150" viewBox="0 0 800 150" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        .bio-card {
          background: #111420;
          border: 1px solid #2a324b;
          border-radius: 14px;
          padding: 20px 24px;
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
          color: #e2e8f0;
          display: flex;
          align-items: center;
          justify-content: space-between;
          box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .bio-left {
          max-width: 520px;
        }

        .bio-name {
          font-size: 20px;
          font-weight: 800;
          color: #38bdf8;
          margin-bottom: 6px;
        }

        .bio-text {
          font-size: 13px;
          color: #94a3b8;
          line-height: 1.5;
        }

        .bio-stats {
          display: flex;
          flex-direction: column;
          gap: 8px;
        }

        .stat-pill {
          background: #1e293b;
          border: 1px solid #334155;
          padding: 6px 14px;
          border-radius: 8px;
          font-size: 12px;
          color: #f1f5f9;
          display: flex;
          align-items: center;
          gap: 8px;
        }

        .highlight {
          color: #f472b6;
          font-weight: 700;
        }
      </style>
      <div class="bio-card">
        <div class="bio-left">
          <div class="bio-name">👋 Hi, I'm Sambit Das!</div>
          <div class="bio-text">
            B.Tech CSE student at <span class="highlight">Techno India University</span> &amp; <span class="highlight">Ramakrishna Mission</span> alum. Building high-impact AI/ML RAG pipelines &amp; decentralized Soroban smart contracts on Stellar.
          </div>
        </div>
        <div class="bio-stats">
          <div class="stat-pill">📍 Kolkata, India 🇮🇳</div>
          <div class="stat-pill">💡 "Building with curiosity"</div>
          <div class="stat-pill">🏆 Hackathon Warrior</div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
