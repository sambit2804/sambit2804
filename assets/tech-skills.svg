<svg fill="none" width="800" height="180" viewBox="0 0 800 180" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        .skills-card {
          background: #0d1117;
          border: 1px solid #30363d;
          border-radius: 14px;
          padding: 20px;
          font-family: 'Segoe UI', -apple-system, sans-serif;
          color: #c9d1d9;
        }

        .skills-grid {
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 16px;
        }

        .skill-item {
          background: #161b22;
          border: 1px solid #21262d;
          border-radius: 10px;
          padding: 12px 16px;
        }

        .skill-header {
          display: flex;
          justify-content: space-between;
          font-size: 13px;
          font-weight: 700;
          margin-bottom: 8px;
        }

        .skill-name { color: #58a6ff; }
        .skill-level { color: #8b949e; font-size: 11px; }

        .progress-bg {
          background: #21262d;
          height: 6px;
          border-radius: 3px;
          overflow: hidden;
        }

        .progress-bar {
          height: 100%;
          border-radius: 3px;
          animation: fill-bar 2s ease-out forwards;
        }

        .bar-ai { width: 92%; background: linear-gradient(90deg, #38bdf8, #818cf8); }
        .bar-web3 { width: 88%; background: linear-gradient(90deg, #f472b6, #c084fc); }
        .bar-web { width: 95%; background: linear-gradient(90deg, #34d399, #10b981); }
        .bar-tools { width: 90%; background: linear-gradient(90deg, #fbbf24, #f59e0b); }
      </style>
      <div class="skills-card">
        <div class="skills-grid">
          <div class="skill-item">
            <div class="skill-header">
              <span class="skill-name">🤖 AI/ML &amp; RAG Architecture</span>
              <span class="skill-level">Python / Gemini / OpenAI</span>
            </div>
            <div class="progress-bg"><div class="progress-bar bar-ai"></div></div>
          </div>
          <div class="skill-item">
            <div class="skill-header">
              <span class="skill-name">⛓️ Soroban Smart Contracts</span>
              <span class="skill-level">Rust / Stellar Network</span>
            </div>
            <div class="progress-bg"><div class="progress-bar bar-web3"></div></div>
          </div>
          <div class="skill-item">
            <div class="skill-header">
              <span class="skill-name">💻 Full-Stack Web Systems</span>
              <span class="skill-level">TypeScript / React / Node</span>
            </div>
            <div class="progress-bg"><div class="progress-bar bar-web"></div></div>
          </div>
          <div class="skill-item">
            <div class="skill-header">
              <span class="skill-name">🛠️ Tools &amp; Ecosystem</span>
              <span class="skill-level">Git / Vercel / Linux</span>
            </div>
            <div class="progress-bg"><div class="progress-bar bar-tools"></div></div>
          </div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
