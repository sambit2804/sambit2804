<svg fill="none" width="800" height="340" viewBox="0 0 800 340" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        .footer-frame {
          background: linear-gradient(180deg, #0d0f19 0%, #080910 100%);
          border: 2px solid #a855f7;
          border-radius: 16px;
          padding: 20px;
          font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
          color: #e2e8f0;
          box-shadow: 0 10px 30px rgba(168, 85, 247, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.1);
          position: relative;
          overflow: hidden;
        }

        .glow-top-line {
          position: absolute;
          top: 0; left: 0; right: 0;
          height: 3px;
          background: linear-gradient(90deg, #a855f7, #ec4899, #3b82f6);
          background-size: 200% 100%;
          animation: glow-move 3s linear infinite;
        }

        @keyframes glow-move {
          0% { background-position: 0% 0%; }
          100% { background-position: 200% 0%; }
        }

        .footer-grid {
          display: flex;
          align-items: center;
          justify-content: space-between;
          gap: 20px;
        }

        .lofi-img-box {
          border: 2px solid #3b82f6;
          border-radius: 12px;
          overflow: hidden;
          box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
          flex-shrink: 0;
          background: #000;
          display: flex;
          align-items: center;
          justify-content: center;
        }

        .lofi-img {
          width: 250px;
          height: 250px;
          object-fit: cover;
          display: block;
        }

        .footer-details {
          flex-grow: 1;
        }

        .footer-header-title {
          font-size: 20px;
          font-weight: 800;
          background: linear-gradient(90deg, #c084fc, #f472b6, #38bdf8);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          margin-bottom: 6px;
        }

        .footer-sub {
          font-size: 12px;
          color: #94a3b8;
          margin-bottom: 16px;
          letter-spacing: 0.5px;
        }

        .status-box {
          background: #151926;
          border: 1px solid #2e364f;
          border-radius: 10px;
          padding: 12px 16px;
          font-family: 'Fira Code', 'Courier New', monospace;
          font-size: 11px;
          color: #a5d6ff;
          display: flex;
          flex-direction: column;
          gap: 8px;
        }

        .status-row {
          display: flex;
          justify-content: space-between;
        }

        .val-purple { color: #c084fc; font-weight: bold; }
        .val-green { color: #4ade80; font-weight: bold; }
        .val-pink { color: #f472b6; font-weight: bold; }

        .sign-off {
          margin-top: 14px;
          text-align: right;
          font-size: 11px;
          color: #64748b;
          font-style: italic;
        }
      </style>
      <div class="footer-frame">
        <div class="glow-top-line"></div>
        <div class="footer-grid">
          <div class="lofi-img-box">
            <img class="lofi-img" src="https://user-images.githubusercontent.com/74038190/212280823-79088828-a258-4a4d-8d6c-96315d5a07af.gif" alt="Busy Work Lofi Coder GIF"/>
          </div>
          <div class="footer-details">
            <div class="footer-header-title">☕ Lofi Workstation &amp; Terminal Outro</div>
            <div class="footer-sub">Building high-impact systems, one commit at a time.</div>
            <div class="status-box">
              <div class="status-row">
                <span>[MODE]</span>
                <span class="val-purple">LOFI &amp; DEEP FOCUS 🎧</span>
              </div>
              <div class="status-row">
                <span>[CURRENT TASK]</span>
                <span class="val-green">BUILDING AI &amp; WEB3 🚀</span>
              </div>
              <div class="status-row">
                <span>[LOCATION]</span>
                <span class="val-pink">KOLKATA, INDIA 🇮🇳</span>
              </div>
              <div class="status-row">
                <span>[CACHE &amp; BUILD]</span>
                <span class="val-purple">99.99% NOMINAL ⚡</span>
              </div>
            </div>
            <div class="sign-off">Designed &amp; Handcrafted with ⚡ by Sambit Das</div>
          </div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
