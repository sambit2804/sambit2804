<svg fill="none" width="800" height="150" viewBox="0 0 800 150" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        .ascii-container {
          background: #090a10;
          border: 2px solid #00f2fe;
          border-radius: 12px;
          padding: 15px;
          font-family: 'Fira Code', 'Courier New', monospace;
          color: #00f2fe;
          position: relative;
          overflow: hidden;
          box-shadow: 0 0 25px rgba(0, 242, 254, 0.3);
        }

        .ascii-art {
          font-size: 11px;
          line-height: 1.15;
          font-weight: bold;
          white-space: pre;
          text-align: center;
          background: linear-gradient(90deg, #00f2fe, #4facfe, #ff0844, #00f2fe);
          background-size: 300% 100%;
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          animation: ascii-glow 4s linear infinite;
        }

        @keyframes ascii-glow {
          0% { background-position: 0% 0%; }
          100% { background-position: 300% 0%; }
        }

        .tagline {
          text-align: center;
          font-size: 11px;
          color: #a5d6ff;
          margin-top: 8px;
          letter-spacing: 3px;
          font-weight: 600;
        }

        .scanline {
          position: absolute;
          top: 0; left: 0; right: 0; bottom: 0;
          background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
          background-size: 100% 4px;
          pointer-events: none;
        }
      </style>
      <div class="ascii-container">
        <div class="scanline"></div>
        <div class="ascii-art">
   _____  ___   ___ ___ _____   ___  ___   ___ 
  / __/ \/ | \ / | | _ )_ _|_  |   \/ _ \ / __|
 _\ \/ /| |  V  | | _ \| |/ _| | |) | _ |\__ \
/___/_/ |_|_|_|_|_|___/___|___||___/|_|_\|___/
        </div>
        <div class="tagline">⚡ AI/ML ARCHITECT • SOROBAN SMART CONTRACT ENGINEER ⚡</div>
      </div>
    </div>
  </foreignObject>
</svg>
