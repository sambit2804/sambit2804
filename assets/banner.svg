<svg fill="none" width="800" height="180" viewBox="0 0 800 180" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        .container {
          background: linear-gradient(135deg, #0d1117 0%, #161b22 50%, #090d16 100%);
          border: 1px solid #30363d;
          border-radius: 12px;
          padding: 24px;
          font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
          color: #c9d1d9;
          position: relative;
          overflow: hidden;
          box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .glow-line {
          position: absolute;
          top: 0;
          left: 0;
          right: 0;
          height: 2px;
          background: linear-gradient(90deg, #00f2fe, #4facfe, #00f2fe, #ff0844);
          background-size: 200% 100%;
          animation: gradient-move 3s linear infinite;
        }

        @keyframes gradient-move {
          0% { background-position: 0% 0%; }
          100% { background-position: 200% 0%; }
        }

        .header {
          display: flex;
          justify-content: space-between;
          align-items: center;
        }

        .title {
          font-size: 26px;
          font-weight: 800;
          background: linear-gradient(90deg, #58a6ff 0%, #a5d6ff 50%, #38bdf8 100%);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          letter-spacing: -0.5px;
          margin: 0;
        }

        .subtitle {
          color: #8b949e;
          font-size: 14px;
          margin-top: 4px;
          font-weight: 500;
        }

        .badges {
          display: flex;
          gap: 10px;
          margin-top: 18px;
        }

        .badge {
          background: rgba(56, 189, 248, 0.1);
          border: 1px solid rgba(56, 189, 248, 0.3);
          color: #38bdf8;
          padding: 5px 12px;
          border-radius: 20px;
          font-size: 11px;
          font-weight: 600;
          letter-spacing: 0.5px;
          text-transform: uppercase;
        }

        .badge.pink {
          background: rgba(244, 114, 182, 0.1);
          border-color: rgba(244, 114, 182, 0.3);
          color: #f472b6;
        }

        .badge.purple {
          background: rgba(168, 85, 247, 0.1);
          border-color: rgba(168, 85, 247, 0.3);
          color: #c084fc;
        }

        .status-dot {
          width: 8px;
          height: 8px;
          background-color: #238636;
          border-radius: 50%;
          display: inline-block;
          margin-right: 6px;
          box-shadow: 0 0 10px #238636;
          animation: pulse 2s infinite;
        }

        @keyframes pulse {
          0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(35, 134, 54, 0.7); }
          70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(35, 134, 54, 0); }
          100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(35, 134, 54, 0); }
        }

        .status-pill {
          display: flex;
          align-items: center;
          background: rgba(22, 27, 34, 0.8);
          border: 1px solid #30363d;
          padding: 4px 12px;
          border-radius: 16px;
          font-size: 12px;
          color: #7d8590;
        }
      </style>
      <div class="container">
        <div class="glow-line"></div>
        <div class="header">
          <div>
            <h1 class="title">Sambit Das ⚡</h1>
            <div class="subtitle">AI/ML Developer &amp; Soroban Smart Contract Engineer</div>
          </div>
          <div class="status-pill">
            <span class="status-dot"></span> Active &amp; Building
          </div>
        </div>
        <div class="badges">
          <span class="badge">🤖 AI / RAG Systems</span>
          <span class="badge purple">⛓️ Soroban / Web3</span>
          <span class="badge pink">🌐 Full-Stack Web</span>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
