<svg fill="none" width="800" height="16" viewBox="0 0 800 16" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        .divider-container {
          display: flex;
          align-items: center;
          justify-content: center;
          height: 16px;
          width: 100%;
        }
        .line {
          height: 2px;
          width: 100%;
          background: linear-gradient(90deg, rgba(48,54,61,0) 0%, rgba(56,189,248,0.8) 50%, rgba(48,54,61,0) 100%);
          border-radius: 2px;
        }
        .diamond {
          width: 8px;
          height: 8px;
          background: #38bdf8;
          transform: rotate(45deg);
          position: absolute;
          box-shadow: 0 0 8px #38bdf8;
        }
      </style>
      <div class="divider-container">
        <div class="line"></div>
        <div class="diamond"></div>
      </div>
    </div>
  </foreignObject>
</svg>
