<svg fill="none" width="800" height="150" viewBox="0 0 800 150" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        .proj-card {
          background: linear-gradient(135deg, #13111c 0%, #1a162b 100%);
          border: 1px solid #7d00ff;
          border-radius: 14px;
          padding: 20px;
          font-family: 'Segoe UI', sans-serif;
          color: #fff;
          display: flex;
          justify-content: space-between;
          align-items: center;
          box-shadow: 0 8px 20px rgba(125, 0, 255, 0.25);
        }
        .proj-title {
          font-size: 18px;
          font-weight: 800;
          color: #c084fc;
          margin-bottom: 6px;
        }
        .proj-desc {
          font-size: 13px;
          color: #cbd5e1;
          max-width: 540px;
          line-height: 1.4;
        }
        .proj-tags {
          display: flex;
          gap: 8px;
          margin-top: 12px;
        }
        .tag {
          background: rgba(192, 132, 252, 0.15);
          border: 1px solid rgba(192, 132, 252, 0.4);
          color: #e9d5ff;
          padding: 4px 10px;
          border-radius: 6px;
          font-size: 11px;
          font-weight: 600;
        }
        .award-badge {
          background: #7d00ff;
          color: #fff;
          padding: 10px 16px;
          border-radius: 12px;
          font-size: 12px;
          font-weight: bold;
          text-align: center;
          box-shadow: 0 4px 12px rgba(125, 0, 255, 0.5);
        }
      </style>
      <div class="proj-card">
        <div>
          <div class="proj-title">🎰 Soroban Sports Betting Platform</div>
          <div class="proj-desc">
            Decentralized, non-custodial sports betting smart contract built on Stellar using Soroban (Rust). Features transparent on-chain stake pools and multi-sig winner claims.
          </div>
          <div class="proj-tags">
            <span class="tag">Rust</span>
            <span class="tag">Soroban SDK</span>
            <span class="tag">Stellar Network</span>
            <span class="tag">Smart Contracts</span>
          </div>
        </div>
        <div class="award-badge">
          🏆 STELLAR<br/>BUILDATHON
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
