<svg fill="none" width="800" height="150" viewBox="0 0 800 150" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        .achieve-card {
          background: #0f172a;
          border: 1px solid #334155;
          border-radius: 14px;
          padding: 20px 24px;
          font-family: 'Segoe UI', sans-serif;
          color: #f8fafc;
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 16px;
        }

        .item {
          display: flex;
          align-items: center;
          gap: 12px;
          background: #1e293b;
          border: 1px solid #475569;
          border-radius: 10px;
          padding: 10px 14px;
        }

        .icon {
          font-size: 24px;
        }

        .title {
          font-size: 13px;
          font-weight: 700;
          color: #38bdf8;
        }

        .sub {
          font-size: 11px;
          color: #94a3b8;
          margin-top: 2px;
        }
      </style>
      <div class="achieve-card">
        <div class="item">
          <span class="icon">🗣️</span>
          <div>
            <div class="title">Ramakrishna Mission Alum</div>
            <div class="sub">Communication Distinction (Decade of Oratory)</div>
          </div>
        </div>
        <div class="item">
          <span class="icon">🎓</span>
          <div>
            <div class="title">Techno India University</div>
            <div class="sub">B.Tech Computer Science (2024 - 2028)</div>
          </div>
        </div>
        <div class="item">
          <span class="icon">⚡</span>
          <div>
            <div class="title">Stellar Buildathon</div>
            <div class="sub">Soroban Smart Contract Developer</div>
          </div>
        </div>
        <div class="item">
          <span class="icon">🌟</span>
          <div>
            <div class="title">InnovateX MAKAUT</div>
            <div class="sub">Full-Stack Hackathon Presenter</div>
          </div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
